version: 2.1

parameters:
  run_monthly_testing:
    type: boolean
    default: false

executors:
  linux:
    machine:
      image: ubuntu-2204:current
    environment:
      RUNNER_OS: linux
    resource_class: large
  macos-arm:
    macos:
      xcode: 16.4.0
    environment:
      RUNNER_OS: macos
    resource_class: m4pro.medium

jobs:
  r-build:
    parameters:
      os:
        type: executor
      r-version:
        type: string
    executor: << parameters.os >>
    environment:
      ITK_GLOBAL_DEFAULT_NUMBER_OF_THREADS: 2
    steps:
      - checkout
      - run:
          name: Set environment
          command: |
            echo "export R_LIBS=$HOME/Rlibs" >> $BASH_ENV
            
      - run:
          name: Install R << parameters.r-version >>
          command: |
            R_VERSION="<< parameters.r-version >>"
            # Install rig, R Installation Manager (https://github.com/r-lib/rig) to control installed R version
            if [ "$RUNNER_OS" == "macos" ]; then
              brew tap r-lib/rig
              brew install --cask rig
              rig add $R_VERSION
              # on macOS the R package is installed into a MAJOR.MINOR directory
              # the PATCH is ignored (only one patch version supported) the
              # architecture is added as a suffix (arm64, x86_64) to allow for
              # installations to coexist
              rig default "${R_VERSION%.*}-arm64"
            elif [ "$RUNNER_OS" == "linux" ]; then
              `which sudo` curl -L https://rig.r-pkg.org/deb/rig.gpg -o /etc/apt/trusted.gpg.d/rig.gpg
              `which sudo` sh -c 'echo "deb http://rig.r-pkg.org/deb rig main" > /etc/apt/sources.list.d/rig.list'
              `which sudo` apt update
              `which sudo` apt install r-rig
              sudo rig add $R_VERSION
              sudo rig default $R_VERSION
            fi
            
      - run:
          name: System Dependencies
          command: |
            if [ "$RUNNER_OS" == "linux" ]; then
              sudo apt-get -y update
              sudo apt-get install -y cmake libcurl4-openssl-dev libssh2-1-dev libharfbuzz-dev libfribidi-dev gh
              sudo rm -rf /var/lib/apt/lists/*
            elif [ "$RUNNER_OS" == "macos" ]; then
              brew install cmake
              brew install gh
            fi
            
      - run: 
          name: Extract version from DESCRIPTION
          id: meta
          command: |
            PACKAGE_VERSION=$(Rscript -e 'x <- read.dcf("DESCRIPTION"); cat(x[1,"Version"])')
            echo "export TAG=${PACKAGE_VERSION}" >> $BASH_ENV

      - run:
          name: Configuration Information
          command: |
            mkdir -p ${R_LIBS}
            c++ --version
            cmake --version || echo "cmake not found"
            which R
            R --version
            
      - run:
          name: Install packages
          command: |
            R -e "install.packages(c('remotes', 'desc'), lib=c('${R_LIBS}'), repo='https://cloud.r-project.org/')"
            
      - run:
          name: Build SimpleITK binaries
          no_output_timeout: 30m
          command: |
            set -x
            mkdir dist 
            R CMD INSTALL --build -l ${R_LIBS} --configure-vars='MAKEJ=6 ADDITIONAL_SITK_MODULES="-DSimpleITK_USE_ELASTIX=ON"' .
            mv *.tgz *.zip *.tar.gz dist/ 2>/dev/null || true
            ls -lah dist
            
      - run:
          name: Upload assets to existing GitHub release
          command: |
            shopt -s nullglob
            files=(dist/*)

            if [ ${#files[@]} -eq 0 ]; then
              echo "No files found in dist/"
              exit 1
            fi
            
            # view release
            gh release view $TAG \
              --repo "$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME"

            gh release upload "$TAG" "${files[@]}" \
              --repo "$CIRCLE_PROJECT_USERNAME/$CIRCLE_PROJECT_REPONAME" \
              --clobber

workflows:
  r-build-test:
    # Runs on: push to main, pull requests to main, manual trigger, and scheduled runs
    jobs:
      - r-build:
          matrix:
            parameters:
              r-version: ['4.5.2']
              os: ["macos-arm"]
          filters:
            branches:
              only:
                - release
                - /pull\/.*/  # Run on all pull request branches